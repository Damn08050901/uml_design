<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你好，世界</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 60px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            max-width: 600px;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        p {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .highlight {
            color: #ffde59;
            font-weight: bold;
        }
        .footer {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>你好，世界！</h1>
        <p>这是一个简单的中文版“Hello, World!”页面。</p>
        <p>欢迎来到 <span class="highlight">Vue.js + Vite</span> 项目示例。</p>
        <p>这个页面展示了如何创建一个独立的中文HTML文件。</p>
        <div class="footer">
            <p>语言: 简体中文 (zh-CN) | 编码: UTF-8</p>
            <p>© 2023 示例项目</p>
        </div>
    </div>
</body>
</html>
