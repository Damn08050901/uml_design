<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            padding: 60px 40px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 90%;
        }
        h1 {
            color: #333;
            font-size: 3.5em;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            color: #666;
            font-size: 1.3em;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .subtitle {
            color: #888;
            font-size: 1.1em;
            margin-top: 30px;
            font-style: italic;
        }
        .timestamp {
            color: #999;
            font-size: 0.9em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello, World!</h1>
        <p>Welcome to this simple HTML demonstration.</p>
        <p>This page was created by D-assistant AI coding agent.</p>
        <p>It features modern styling with gradient backgrounds and responsive design.</p>
        <div class="subtitle">Open the console to see a JavaScript greeting!</div>
        <div class="timestamp" id="timestamp"></div>
    </div>

    <script>
        // Display current date and time
        const now = new Date();
        const timestamp = document.getElementById('timestamp');
        timestamp.textContent = `Generated on: ${now.toLocaleDateString()} at ${now.toLocaleTimeString()}`;
        
        // Console greeting
        console.log('Hello from helloworld.html! 👋');
        console.log('This page was created by D-assistant.');
        
        // Add a simple interactive effect
        document.querySelector('h1').addEventListener('click', function() {
            this.style.transform = 'scale(1.05)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 300);
            console.log('Hello World heading was clicked!');
        });
    </script>
</body>
</html>
